<h2>Edit Teacher</h2>

<form method="POST">
    {% csrf_token %}

    Username:
    <input type="text" name="username" value="{{ teacher.user.username }}"><br><br>

    Subject:
    <input type="text" name="subject" value="{{ teacher.subject }}"><br><br>

    Phone:
    <input type="text" name="phone" value="{{ teacher.phone }}"><br><br>

    <button type="submit">Update</button>
</form>

<br>
<a href="{% url 'teacher_list' %}">Back</a>
